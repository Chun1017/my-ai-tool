<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 極速重生版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #fff; text-align: center; border: 1px solid #eee; border-radius: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { background: #000; color: #fff; cursor: pointer; font-weight: bold; }
        #status { color: #2563eb; font-weight: bold; margin: 20px 0; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        #debug { font-size: 11px; color: red; text-align: left; background: #f9f9f9; padding: 10px; display: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h3>💎 珠寶 AI 攝影師</h3>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="fileInput">
    <button id="btn" onclick="run()">🚀 立即生圖 (DALL-E 3 路由)</button>
    
    <div id="status">準備就緒 (請開 VPN)</div>
    <img id="output">
    <pre id="debug"></pre>

<script>
async function run() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const out = document.getElementById('output');

    if(!key || !file) return alert("請填寫 Key 同選圖");

    status.innerText = "⏳ 正在分析圖片...";
    debug.style.display = "none";
    out.style.display = "none";

    try {
        const b64 = await new Promise(r => {
            const f = new FileReader();
            f.onload = e => r(e.target.result);
            f.readAsDataURL(file);
        });

        // 1. 使用最穩定的 GPT-4o-mini 來生成圖片指令
        status.innerText = "⏳ 正在生成展示圖 (可能需要 20-30 秒)...";
        
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Authorization": `Bearer ${key}`, 
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "openai/gpt-4o-mini", 
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Based on this jewelry, generate a professional commercial photo on pure white background. Return only the direct image URL." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        if(data.error) throw new Error(data.error.message);

        const content = data.choices[0].message.content;
        const urlMatch = content.match(/https?:\/\/\S+/g);

        if(urlMatch) {
            const url = urlMatch[0].replace(/[")].*$/, "");
            out.src = url;
            out.style.display = "block";
            status.innerText = "🎉 生成完畢！";
        } else {
            throw new Error("AI 回傳了文字但沒有網址：" + content);
        }

    } catch (e) {
        status.innerText = "❌ 失敗";
        debug.innerText = e.message;
        debug.style.display = "block";
    }
}
</script>
</body>
</html>
