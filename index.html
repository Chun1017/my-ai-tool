<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 - 救命穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #fdfdfd; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .box { border: 2px dashed #ddd; padding: 20px; border-radius: 15px; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #000; color: white; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #d32f2f; font-weight: bold; margin: 20px 0; }
        #debug { background: #333; color: #fff; padding: 15px; font-size: 11px; display: none; text-align: left; overflow: auto; max-height: 200px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">💎 珠寶 AI 攝影師 (萬能修正版)</h2>
    <input type="password" id="apiKey" placeholder="貼上 API Key">
    <input type="text" id="sku" placeholder="輸入 SKU">
    <input type="file" id="fileInput" accept="image/*">
    <button id="mainBtn" onclick="execute()">🚀 立即生成 (Gemini 引擎)</button>
    <div id="status">準備就緒</div>
    <div class="grid">
        <div class="box"><b>1. 白底圖</b><img id="r1"><button id="d1" style="display:none" onclick="dl(1)">💾 下載</button></div>
        <div class="box"><b>2. 灰底圖</b><img id="r2"><button id="d2" style="display:none" onclick="dl(2)">💾 下載</button></div>
    </div>
    <pre id="debug"></pre>
</div>

<script>
async function execute() {
    const key = document.getElementById('apiKey').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    if(!key || !file) return alert("資料未齊");

    document.getElementById('mainBtn').disabled = true;
    debug.style.display = "none";
    status.innerText = "⏳ 正在分析與生成中 (Gemini 2.0)...";

    try {
        // 1. 轉 Base64
        const base64 = await new Promise(res => {
            const reader = new FileReader();
            reader.onload = e => res(e.target.result);
            reader.readAsDataURL(file);
        });

        // 2. 直接使用 Gemini 2.0 (全能 ID)
        const callGemini = async (promptText, isVisual) => {
            const body = {
                model: "google/gemini-2.0-flash-001",
                messages: [{
                    role: "user",
                    content: isVisual 
                        ? [{ type: "text", text: promptText }, { type: "image_url", image_url: { url: base64 } }]
                        : [{ type: "text", text: promptText }]
                }]
            };
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            return data.choices[0].message.content;
        };

        // 步驟 A: 辨識材質
        const mat = await callGemini("What is this jewelry made of? One word only.", true);
        const material = mat.trim().replace(/[^a-zA-Z]/g, '');
        status.innerText = `✨ 材質: ${material}。正在生成展示圖...`;

        // 步驟 B: 生圖 (Gemini 會調用內部工具或回傳穩定網址)
        const gen = async (bg, id, btn) => {
            const p = `Generate a professional commercial photography image URL for a ${material} jewelry piece, centered on ${bg} background, studio light, 8k resolution. Return ONLY the image URL.`;
            const result = await callGemini(p, false);
            const urlMatch = result.match(/https?:\/\/\S+/g);
            if(!urlMatch) throw new Error("未能生成圖片網址，請確認帳戶是否有權限");
            
            const url = urlMatch[0].replace(/[")].*$/, "");
            document.getElementById(id).src = url;
            document.getElementById(id).style.display = "block";
            document.getElementById(btn).style.display = "inline-block";
        };

        await Promise.all([ gen("pure white", "r1", "d1"), gen("soft grey", "r2", "d2") ]);
        status.innerText = "🎉 生成完畢！";

    } catch (e) {
        status.innerText = "❌ 失敗";
        debug.innerText = e.message;
        debug.style.display = "block";
    } finally {
        document.getElementById('mainBtn').disabled = false;
    }
}

function dl(i) {
    const s = document.getElementById('sku').value || "item";
    const a = document.createElement('a');
    a.href = document.getElementById(`r${i}`).src;
    a.download = `${s}-${i}.jpg`;
    a.click();
}
</script>
</body>
</html>
