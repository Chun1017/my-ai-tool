<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶專業攝影 - 極速版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #fff; }
        .card { padding: 30px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: 1px solid #eee; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        #out { max-width: 100%; border-radius: 16px; display: none; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #debug { font-size: 11px; color: #999; margin-top: 15px; text-align: left; background: #f9f9f9; padding: 12px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶專業攝影 (極速穩定版)</h3>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file" accept="image/*">
    <button id="btn" onclick="start()">🚀 立即生成 (跟足款式)</button>
    
    <div id="status">準備就緒</div>
    <img id="out">
    <div id="debug"></div>
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const debug = document.getElementById('debug');
    const btn = document.getElementById('btn');

    if(!key || !file) return alert("請填寫資料");

    btn.disabled = true;
    out.style.display = "none";
    debug.style.display = "none";
    status.innerText = "⏳ 正在分析細節...";

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${key}` },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-001", 
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Identify this jewelry. Provide a 15-word max English description of its exact shape and color for image generation. No fluff." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        const desc = data.choices[0].message.content.trim();
        
        status.innerText = "🎨 正在繪製圖片 (通常 5-10 秒)...";

        // 精簡後的 Prompt
        const promptText = `Professional product photo of ${desc}, centered on pure white background, studio lighting, high quality, 8k`;
        const finalUrl = `https://pollinations.ai/p/${encodeURIComponent(promptText)}?width=1024&height=1024&seed=${Math.floor(Math.random()*999)}&model=flux`;

        // 監聽圖片載入
        out.onload = () => {
            out.style.display = 'block';
            status.innerText = "🎉 生成成功！";
        };

        // 如果 15 秒都出唔到，嘗試換一個種子值重試
        setTimeout(() => {
            if (out.style.display === "none") {
                status.innerText = "⚠️ 伺服器反應慢，正在重新連接...";
                out.src = finalUrl + "&retry=1";
            }
        }, 15000);

        out.src = finalUrl;
        debug.style.display = "block";
        debug.innerText = "分析結果：" + desc;
        
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
