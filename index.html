<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 最終穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #fdfdfd; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #eee; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        img { max-width: 100%; border-radius: 12px; display: none; margin-top: 20px; border: 1px solid #eee; }
        #debug { font-size: 11px; color: #999; margin-top: 15px; display: none; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶 AI 攝影師</h3>
    <p style="font-size: 12px; color: #888;">強制穩定版 (需開 VPN)</p>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file" accept="image/*">
    <button id="btn" onclick="start()">🚀 立即生成白底照片</button>
    
    <div id="status">準備就緒</div>
    <img id="out">
    <div id="debug"></div>
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const debug = document.getElementById('debug');
    const btn = document.getElementById('btn');

    if(!key || !file) return alert("請填寫 Key 並選圖");

    btn.disabled = true;
    out.style.display = "none";
    debug.style.display = "none";
    status.innerText = "⏳ 正在分析材質 (美國中轉站)...";

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        // 第一步：叫 AI 分析呢件珠寶係乜
        const res = await fetch("/api/proxy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                apiKey: key,
                model: "google/gemini-2.0-flash-001", 
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Identify this jewelry. Return ONLY a 5-word English description of its appearance (e.g. 'Silver moissanite heart pendant necklace')." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        
        if (data.choices && data.choices[0].message) {
            const description = data.choices[0].message.content.trim();
            status.innerText = "🎨 辨識成功，正在繪圖...";
            
            // 第二步：直接用程式砌條生圖 URL，100% 避開 match 錯誤
            const prompt = encodeURIComponent(`Professional commercial photo of ${description}, centered, pure white background, studio lighting, high resolution, 8k`);
            const finalUrl = `https://image.pollinations.ai/prompt/${prompt}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000)}`;

            out.src = finalUrl;
            out.style.display = "block";
            status.innerText = "🎉 生成成功！圖片載入中...";
            
            debug.style.display = "block";
            debug.innerText = "AI 辨識結果：" + description;
        } else {
            throw new Error(data.error ? data.error.message : "AI 冇反應");
        }
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
