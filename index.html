<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 V1.2 - 雙圖生成版</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .img-box { border: 1px solid #e0e0e0; padding: 15px; text-align: center; border-radius: 10px; background: #fff; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .img-box img { max-width: 100%; border-radius: 5px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 10px; display: none; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { font-weight: bold; color: #007bff; text-align: center; margin: 15px 0; min-height: 24px; }
        #debug { background: #1e1e1e; color: #9cdcfe; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; display: none; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">💎 珠寶 AI 智能攝影師</h2>
    
    <label>OpenRouter API Key</label>
    <input type="password" id="apiKey" placeholder="sk-or-v1-...">

    <label>商品 SKU (檔名前綴)</label>
    <input type="text" id="sku" placeholder="例如: MS-882">

    <label>上傳商品原圖 (珍珠/莫桑鑽/玉器)</label>
    <input type="file" id="fileInput" accept="image/*">

    <button id="mainBtn" onclick="processAll()">🚀 一鍵生成 白底 + 灰底 圖</button>
    
    <div id="status" class="status"></div>

    <div class="grid-container">
        <div class="img-box">
            <div style="margin-bottom:10px;"><b>圖 1: 純白背景 (Amazon/eBay)</b></div>
            <img id="res1">
            <button id="dl1" style="display:none; width:auto; padding:8px 20px;" onclick="downloadImg(1)">💾 下載 -1.jpg</button>
        </div>
        <div class="img-box">
            <div style="margin-bottom:10px;"><b>圖 2: 淺灰背景 (網站展示)</b></div>
            <img id="res2">
            <button id="dl2" style="display:none; width:auto; padding:8px 20px;" onclick="downloadImg(2)">💾 下載 -2.jpg</button>
        </div>
    </div>

    <pre id="debug"></pre>
</div>

<script>
async function resizeImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 1024; 
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.85));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function callAI(key, model, messages) {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
        body: JSON.stringify({ "model": model, "messages": messages })
    });
    const data = await res.json();
    if (!data.choices) throw new Error(JSON.stringify(data));
    return data.choices[0].message.content;
}

async function processAll() {
    const key = document.getElementById('apiKey').value;
    const sku = document.getElementById('sku').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');

    if (!key || !sku || !file) return alert("請輸入 Key, SKU 並上傳圖片");

    mainBtn.disabled = true;
    status.innerText = "⏳ 正在分析材質與優化圖片...";

    try {
        const resizedUrl = await resizeImage(file);
        
        // 1. 識別材質 (Gemini 2.0 Flash)
        const material = await callAI(key, "google/gemini-2.0-flash-001", [
            { role: "user", content: [
                { type: "text", text: "Identify the material: Pearl, Moissanite, Crystal, or Jade. Answer only the word." },
                { type: "image_url", image_url: { url: resizedUrl } }
            ]}
        ]);
        status.innerText = `✨ 辨識結果：${material.trim()}。正在生成 2 張展示圖...`;

        // 2. 定義生成邏輯 (Imagen 3)
        const generateImg = async (bgDesc, imgId, btnId) => {
            let prompt = `Professional product photography of the ${material} jewelry from the image. Place it on a ${bgDesc} studio background. Soft cinematic lighting, sharp focus, 1000x1000. `;
            if(material.toLowerCase().includes("pearl")) prompt += "Enhance pearlescent luster and iridescence.";
            if(material.toLowerCase().includes("moissanite")) prompt += "Enhance diamond fire, sparkles, and sharp facets.";
            if(material.toLowerCase().includes("jade")) prompt += "Enhance translucency and waxy smooth texture.";

            const content = await callAI(key, "google/imagen-3", [
                { role: "user", content: [
                    { type: "text", text: prompt },
                    { type: "image_url", image_url: { url: resizedUrl } }
                ]}
            ]);

            const urlMatch = content.match(/https?:\/\/\S+/g);
            if (urlMatch) {
                const el = document.getElementById(imgId);
                el.src = urlMatch[0];
                el.style.display = "block";
                document.getElementById(btnId).style.display = "inline-block";
            }
        };

        // 並行生成白底圖與灰底圖
        await Promise.all([
            generateImg("pure seamless white (#FFFFFF)", "res1", "dl1"),
            generateImg("minimalist soft light grey (#F2F2F2)", "res2", "dl2")
        ]);

        status.innerText = "🎉 全部圖片生成完畢！";
    } catch (e) {
        status.innerText = "❌ 發生錯誤";
        document.getElementById('debug').innerText = e.message;
        document.getElementById('debug').style.display = "block";
    } finally {
        mainBtn.disabled = false;
    }
}

function downloadImg(index) {
    const sku = document.getElementById('sku').value;
    const img = document.getElementById(`res${index}`);
    const link = document.createElement('a');
    link.href = img.src;
    link.download = `${sku}-${index}.jpg`;
    link.click();
}
</script>

</body>
</html>
