<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 最終手動版</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; text-align: center; background: #f4f4f4; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; }
        #status { margin: 20px; color: blue; font-weight: bold; }
        img { max-width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>💎 珠業 AI 攝影師</h2>
    <input type="password" id="key" placeholder="貼上 API Key">
    <input type="file" id="file">
    <button id="btn" onclick="go()">🚀 立即生圖</button>
    <div id="status">準備就緒</div>
    <img id="out">
    <div id="debug" style="font-size:10px; color:red; margin-top:20px; text-align:left;"></div>
</div>

<script>
async function go() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    
    if(!key || !file) return alert("請輸入 Key 同選圖");
    
    status.innerText = "⏳ 正在處理 (請確保已開 VPN)...";
    
    try {
        const b64 = await new Promise(r => {
            const reader = new FileReader();
            reader.onload = e => r(e.target.result);
            reader.readAsDataURL(file);
        });

        // 直接生圖，唔再做材質辨識，減低失敗率
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-001", // Gemini 2.0 係目前 OpenRouter 最穩嘅
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Create a professional jewelry shot of this item on a pure white background. Return only the URL of the generated image." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        if(data.error) throw new Error(data.error.message);

        const content = data.choices[0].message.content;
        const urlMatch = content.match(/https?:\/\/\S+/g);
        
        if(urlMatch) {
            const url = urlMatch[0].replace(/[")].*$/, "");
            document.getElementById('out').src = url;
            document.getElementById('out').style.display = "block";
            status.innerText = "🎉 成功！";
        } else {
            throw new Error("AI 回傳咗內容但搵唔到網址: " + content.substring(0, 100));
        }

    } catch (e) {
        status.innerText = "❌ 失敗";
        debug.innerText = e.message;
    }
}
</script>
</body>
</html>
