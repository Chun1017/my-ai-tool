<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 V1.3 - 突破地區限制版</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f0f4f8; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .img-box { border: 1px solid #e0e0e0; padding: 15px; text-align: center; border-radius: 10px; background: #fff; min-height: 300px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .img-box img { max-width: 100%; border-radius: 5px; margin-bottom: 10px; display: none; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #ccc; }
        .status { font-weight: bold; color: #1a73e8; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align: center;">💎 珠寶 AI 攝影師 (國際版)</h2>
    
    <label>OpenRouter API Key</label>
    <input type="password" id="apiKey" placeholder="sk-or-v1-...">

    <label>商品 SKU</label>
    <input type="text" id="sku" placeholder="例如: MS-882">

    <label>上傳商品原圖</label>
    <input type="file" id="fileInput" accept="image/*">

    <button id="mainBtn" onclick="processAll()">🚀 突破限制：一鍵生圖</button>
    
    <div id="status" class="status"></div>

    <div class="grid-container">
        <div class="img-box">
            <b>圖 1: 純白背景</b>
            <img id="res1">
            <button id="dl1" style="display:none; width:auto;" onclick="downloadImg(1)">💾 下載 -1</button>
        </div>
        <div class="img-box">
            <b>圖 2: 淺灰背景</b>
            <img id="res2">
            <button id="dl2" style="display:none; width:auto;" onclick="downloadImg(2)">💾 下載 -2</button>
        </div>
    </div>
</div>

<script>
async function resizeImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; 
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.8));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

async function callAI(key, model, messages) {
    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { 
            "Authorization": `Bearer ${key}`, 
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.href 
        },
        body: JSON.stringify({ "model": model, "messages": messages })
    });
    const data = await res.json();
    if (!data.choices) throw new Error(data.error?.message || JSON.stringify(data));
    return data.choices[0].message.content;
}

async function processAll() {
    const key = document.getElementById('apiKey').value;
    const sku = document.getElementById('sku').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');

    if (!key || !sku || !file) return alert("請填寫所有資料");

    mainBtn.disabled = true;
    status.innerText = "⏳ 正在辨識材質 (Claude 3.5)...";

    try {
        const resizedUrl = await resizeImage(file);
        const base64Image = resizedUrl.split(',')[1];
        
        // 1. 識別材質 (改用 Claude 3.5 Sonnet，避開 Google 地區限制)
        const material = await callAI(key, "anthropic/claude-3.5-sonnet", [
            { role: "user", content: [
                { type: "text", text: "Identify the jewelry material: Pearl, Moissanite, Crystal, or Jade. Answer only the word." },
                { type: "image_url", image_url: { url: resizedUrl } }
            ]}
        ]);
        status.innerText = `✨ 辨識結果：${material.trim()}。正在生圖 (Flux)...`;

        // 2. 生成邏輯 (改用 Flux-1-Schnell，無地區限制且珠寶效果極佳)
        const generateImg = async (bg, imgId, btnId) => {
            let prompt = `A professional studio product photo of a ${material} jewelry, ${bg} background, high-end commercial lighting, 1024x1024. `;
            if(material.toLowerCase().includes("pearl")) prompt += "Lustrous surfaces, soft glowing reflections.";
            if(material.toLowerCase().includes("moissanite")) prompt += "Dazzling fire, sharp diamond-like sparkles.";

            const content = await callAI(key, "black-forest-labs/flux-1-schnell", [
                { role: "user", content: prompt }
            ]);

            const urlMatch = content.match(/https?:\/\/\S+/g);
            if (urlMatch) {
                const el = document.getElementById(imgId);
                el.src = urlMatch[0].replace(/[")].*$/, ""); // 清理網址
                el.style.display = "block";
                document.getElementById(btnId).style.display = "inline-block";
            }
        };

        await Promise.all([
            generateImg("pure white", "res1", "dl1"),
            generateImg("minimalist light grey", "res2", "dl2")
        ]);

        status.innerText = "🎉 生成成功！快睇吓效果！";
    } catch (e) {
        status.innerText = "❌ 報錯: " + e.message;
    } finally {
        mainBtn.disabled = false;
    }
}

function downloadImg(index) {
    const sku = document.getElementById('sku').value;
    const img = document.getElementById(`res${index}`);
    const link = document.createElement('a');
    link.href = img.src;
    link.download = `${sku}-${index}.jpg`;
    link.click();
}
</script>

</body>
</html>
