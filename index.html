<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 - 最終修正版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f9; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { border: 2px dashed #ddd; padding: 15px; border-radius: 10px; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; border: 1px solid #eee; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #1a73e8; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #999; cursor: not-allowed; }
        #status { color: #1a73e8; font-weight: bold; margin: 15px 0; text-align: center; }
        #debug { background: #222; color: #4af2a1; padding: 15px; font-size: 12px; display: none; text-align: left; overflow: auto; max-height: 200px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center">💎 珠寶 AI 攝影師</h2>
    <input type="password" id="apiKey" placeholder="貼上 OpenRouter API Key">
    <input type="text" id="sku" placeholder="輸入 SKU (例如: Heart-925)">
    <input type="file" id="fileInput" accept="image/*">
    <button id="mainBtn" onclick="runProcess()">🚀 一鍵生成 2 張展示圖</button>
    <div id="status">準備就緒</div>
    
    <div class="grid">
        <div class="box">
            <b>1. 白底圖 (eBay/Amazon)</b>
            <img id="img1">
            <button id="btn1" style="display:none; width:auto; font-size:12px" onclick="downloadImg(1)">💾 下載 -1.jpg</button>
        </div>
        <div class="box">
            <b>2. 灰底圖 (官網用)</b>
            <img id="img2">
            <button id="btn2" style="display:none; width:auto; font-size:12px" onclick="downloadImg(2)">💾 下載 -2.jpg</button>
        </div>
    </div>
    <pre id="debug"></pre>
</div>

<script>
// A. 圖片壓縮功能 (解決 resizeImage is not defined 問題)
async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800; // 壓縮到 800px 慳錢又快
                let w = img.width, h = img.height;
                if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } } 
                else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

// B. 呼叫 API 功能
async function callOpenRouter(key, model, messages) {
    const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { 
            "Authorization": `Bearer ${key}`, 
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.href
        },
        body: JSON.stringify({ model: model, messages: messages })
    });
    const data = await response.json();
    if (!data.choices || data.error) throw new Error(data.error?.message || "API 回傳錯誤");
    return data.choices[0].message.content;
}

// C. 主流程
async function runProcess() {
    const key = document.getElementById('apiKey').value;
    const sku = document.getElementById('sku').value || "item";
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');
    const debug = document.getElementById('debug');

    if (!key || !file) return alert("請輸入 API Key 並上傳圖片");

    mainBtn.disabled = true;
    debug.style.display = "none";
    status.innerText = "⏳ 步驟 1: 正在壓縮圖片...";

    try {
        const resizedUrl = await compressImage(file);
        
        status.innerText = "⏳ 步驟 2: 正在辨識材質 (Qwen)...";
        const material = await callOpenRouter(key, "qwen/qwen-2-vl-7b-instruct", [
            { role: "user", content: [
                { type: "text", text: "Identify jewelry material: Pearl, Moissanite, Crystal, or Jade. Answer ONE word." },
                { type: "image_url", image_url: { url: resizedUrl } }
            ]}
        ]);

        status.innerText = `✅ 辨識為 ${material.trim()}。步驟 3: 正在生圖 (Flux)...`;

        const genImg = async (bg, imgId, btnId) => {
            const prompt = `Extreme high-quality commercial photo of ${material} jewelry, ${bg} background, studio lighting, hyper-realistic, 1024x1024.`;
            const content = await callOpenRouter(key, "black-forest-labs/flux-1-schnell", [
                { role: "user", content: prompt }
            ]);
            const url = content.match(/https?:\/\/\S+/g)[0].replace(/[")].*$/, "");
            const el = document.getElementById(imgId);
            el.src = url;
            el.style.display = "block";
            document.getElementById(btnId).style.display = "inline-block";
        };

        // 同時生兩張
        await Promise.all([
            genImg("pure white", "img1", "btn1"),
            genImg("soft light grey", "img2", "btn2")
        ]);

        status.innerText = "🎉 生成完畢！可以下載圖片了。";

    } catch (e) {
        status.innerText = "❌ 發生錯誤";
        debug.innerText = e.message;
        debug.style.display = "block";
    } finally {
        mainBtn.disabled = false;
    }
}

function downloadImg(i) {
    const sku = document.getElementById('sku').value || "item";
    const a = document.createElement('a');
    a.href = document.getElementById(`img${i}`).src;
    a.download = `${sku}-${i}.jpg`;
    a.click();
}
</script>

</body>
</html>
