<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 - VPN 專用極速版</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #fdfdfd; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .box { border: 2px dashed #ddd; padding: 20px; border-radius: 15px; min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #000; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #ccc; }
        #status { color: #d32f2f; font-weight: bold; margin: 20px 0; min-height: 24px; }
        #debug { background: #333; color: #fff; padding: 15px; font-size: 11px; display: none; text-align: left; overflow: auto; max-height: 200px; border-radius: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">💎 珠寶 AI 攝影師 (VPN 專用)</h2>
    <input type="password" id="apiKey" placeholder="貼上 OpenRouter API Key">
    <input type="text" id="sku" placeholder="輸入 SKU (例如: BLUE-HEART)">
    <input type="file" id="fileInput" accept="image/*">
    <button id="mainBtn" onclick="executeProcess()">🚀 飛速生成 (Gemini 2.0)</button>
    <div id="status">準備就緒 (請確保已開啟 VPN)</div>
    
    <div class="grid">
        <div class="box"><b>1. 白底圖</b><img id="r1"><button id="d1" style="display:none; width:auto; font-size:12px;" onclick="dl(1)">💾 下載</button></div>
        <div class="box"><b>2. 灰底圖</b><img id="r2"><button id="d2" style="display:none; width:auto; font-size:12px;" onclick="dl(2)">💾 下載</button></div>
    </div>
    <pre id="debug"></pre>
</div>

<script>
// 1. 極簡圖片處理 (唔壓縮，直接傳，賭 VPN 速度)
async function toBase64(file) {
    return new Promise(res => {
        const reader = new FileReader();
        reader.onload = e => res(e.target.result);
        reader.readAsDataURL(file);
    });
}

// 2. 直連 Gemini 2.0 函數
async function askGemini(key, prompt, base64Data) {
    const payload = {
        model: "google/gemini-2.0-flash-001", // VPN 環境下最穩定的模型
        messages: [{
            role: "user",
            content: base64Data 
                ? [{ type: "text", text: prompt }, { type: "image_url", image_url: { url: base64Data } }]
                : [{ type: "text", text: prompt }]
        }]
    };

    const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
        method: "POST",
        headers: { 
            "Authorization": `Bearer ${key}`, 
            "Content-Type": "application/json",
            "HTTP-Referer": window.location.origin // 增加穩定性
        },
        body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.choices[0].message.content;
}

// 3. 主流程
async function executeProcess() {
    const key = document.getElementById('apiKey').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');
    const debug = document.getElementById('debug');

    if (!key || !file) return alert("Key 或圖片未上傳");

    mainBtn.disabled = true;
    debug.style.display = "none";
    status.innerText = "⏳ 正在與 Gemini 伺服器同步 (請保持 VPN 連線)...";

    try {
        const imgData = await toBase64(file);
        
        // A. 辨識材質
        status.innerText = "⏳ 步驟 1/2: 辨識材質...";
        const matRaw = await askGemini(key, "Identify the jewelry material in ONE word: Pearl, Moissanite, Crystal, or Jade.", imgData);
        const material = matRaw.trim().replace(/[^a-zA-Z]/g, '');

        status.innerText = `✨ 材質：${material}。步驟 2/2: 正在生成高品質網址...`;

        // B. 生圖
        const gen = async (bg, id, btn) => {
            const p = `Generate a direct commercial image URL of a ${material} jewelry, centered, ${bg} background, studio light. Return ONLY the URL.`;
            const result = await askGemini(key, p, null); // 生圖唔使再傳圖
            const urlMatch = result.match(/https?:\/\/\S+/g);
            
            if (!urlMatch) throw new Error("未能從 Gemini 獲取網址");
            
            const url = urlMatch[0].replace(/[")].*$/, "");
            const el = document.getElementById(id);
            el.src = url;
            el.style.display = "block";
            document.getElementById(btn).style.display = "inline-block";
        };

        // 並行生成
        await Promise.all([
            gen("pure white", "r1", "d1"),
            gen("soft light grey", "r2", "d2")
        ]);

        status.innerText = "🎉 成功！圖片已生成。";

    } catch (err) {
        status.innerText = "❌ 連線失敗 (請檢查 VPN)";
        debug.innerText = "詳細錯誤：\n" + err.message;
        debug.style.display = "block";
        console.error(err);
    } finally {
        mainBtn.disabled = false;
    }
}

function dl(i) {
    const s = document.getElementById('sku').value || "item";
    const a = document.createElement('a');
    a.href = document.getElementById(`r${i}`).src;
    a.download = `${s}-${i}.jpg`;
    a.click();
}
</script>

</body>
</html>
