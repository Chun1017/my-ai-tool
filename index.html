<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 專業生圖版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        #out { max-width: 100%; border-radius: 12px; display: none; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶 AI 專業攝影</h3>
    <p style="font-size: 12px; color: #888;">使用 Flux 頂級引擎 (需開 VPN)</p>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file" accept="image/*">
    <button id="btn" onclick="start()">🚀 立即生成專業照片</button>
    <div id="status">準備就緒</div>
    <img id="out">
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const btn = document.getElementById('btn');

    if(!key || !file) return alert("請填寫 Key 並選圖");

    btn.disabled = true;
    out.style.display = "none";
    status.innerText = "⏳ 正在分析材質並生成 (約需 20 秒)...";

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        const res = await fetch("/api/proxy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                apiKey: key,
                // 強制使用 black-forest-labs/flux-schnell 呢個最強生圖模型
                model: "black-forest-labs/flux-schnell", 
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "A professional commercial product photo of this jewelry, highly detailed, centered on a pure white background, studio lighting, 8k resolution." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        
        // 檢查 OpenRouter 是否有回傳正確的圖片內容
        if (data.choices && data.choices[0].message.content) {
            const content = data.choices[0].message.content;
            const urlMatch = content.match(/https?:\/\/[^\s"'>)]+/g);
            
            if (urlMatch) {
                out.src = urlMatch[0];
                out.style.display = "block";
                status.innerText = "🎉 生成成功！";
            } else {
                status.innerText = "❌ AI 冇俾網址，請再試一次";
            }
        } else if (data.error) {
            throw new Error(data.error.message);
        }
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
