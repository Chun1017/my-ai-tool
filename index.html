<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 - 重生版</title>
    <style>
        body { font-family: system-ui; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f6; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .box { border: 2px dashed #ccc; padding: 15px; border-radius: 10px; min-height: 250px; background: #fafafa; position: relative; }
        img { max-width: 100%; border-radius: 8px; display: none; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #1a1a1a; color: white; cursor: pointer; font-weight: bold; border: none; }
        button:disabled { background: #999; }
        #log { background: #ececec; padding: 10px; font-size: 12px; border-radius: 5px; margin-top: 15px; text-align: left; max-height: 150px; overflow: auto; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">💎 珠寶 AI 攝影師</h2>
    <p style="font-size:12px; color:red; text-align:center;">* 請確保 VPN 已連接（建議日本/美國）</p>
    
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="text" id="sku" placeholder="商品 SKU">
    <input type="file" id="file">
    
    <button id="btn" onclick="start()">🚀 立即生成兩張圖</button>
    
    <div id="status" style="margin: 15px 0; font-weight: bold; color: #2563eb;">準備就緒</div>
    
    <div class="grid">
        <div class="box"><b>1. 純白背景</b><img id="img1"><button id="dl1" style="display:none; margin-top:10px;" onclick="save(1)">💾 下載</button></div>
        <div class="box"><b>2. 淺灰背景</b><img id="img2"><button id="dl2" style="display:none; margin-top:10px;" onclick="save(2)">💾 下載</button></div>
    </div>
    
    <pre id="log"></pre>
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    
    if(!key || !file) return alert("請輸入 Key 並選圖");

    document.getElementById('btn').disabled = true;
    log.style.display = "block";
    log.innerText = "開始連線...";
    status.innerText = "⏳ 正在辨識材質...";

    try {
        // 1. 轉 Base64
        const b64 = await new Promise(r => {
            const f = new FileReader();
            f.onload = e => r(e.target.result);
            f.readAsDataURL(file);
        });

        // 2. 呼叫 Llama 3.2 Vision (辨識材質)
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "meta-llama/llama-3.2-11b-vision-instruct",
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "What jewelry material is this? One word: Pearl, Moissanite, Jade, or Silver?" },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        const material = data.choices[0].message.content.trim().replace(/[^a-zA-Z]/g, '');
        
        status.innerText = `✨ 材質: ${material}。正在生成展示圖...`;
        log.innerText += `\n材質辨識成功: ${material}`;

        // 3. 生圖函數 (用 Google Imagen 或 OpenAI，視乎 OpenRouter 分配，通常 ID 最穩)
        const generate = async (bg, imgId, btnId) => {
            const prompt = `High-end jewelry photography, a ${material} jewelry piece, centered on ${bg} background, studio soft lighting, 8k resolution, highly detailed.`;
            
            const gRes = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "openai/dall-e-3", // 改用 DALL-E 3，佢對 Prompt 嘅理解同 URL 回傳最穩
                    messages: [{ role: "user", content: prompt }]
                })
            });
            const gData = await gRes.json();
            if(gData.error) throw new Error(gData.error.message);
            
            // 嘗試從文字中抓取 URL，或者直接讀取回傳嘅 content
            const content = gData.choices[0].message.content;
            const urlMatch = content.match(/https?:\/\/\S+/g);
            if(!urlMatch) throw new Error("生圖成功但未抓取到 URL");

            const url = urlMatch[0].replace(/[")].*$/, "");
            document.getElementById(imgId).src = url;
            document.getElementById(imgId).style.display = "block";
            document.getElementById(btnId).style.display = "block";
        };

        await Promise.all([
            generate("pure white", "img1", "dl1"),
            generate("light studio grey", "img2", "dl2")
        ]);

        status.innerText = "🎉 全部完成！";
        log.innerText += "\n所有圖片已成功載入。";

    } catch (e) {
        status.innerText = "❌ 失敗";
        log.innerText += "\n錯誤詳情: " + e.message;
        console.error(e);
    } finally {
        document.getElementById('btn').disabled = false;
    }
}

function save(i) {
    const sku = document.getElementById('sku').value || "jewel";
    const a = document.createElement('a');
    a.href = document.getElementById(`img${i}`).src;
    a.download = `${sku}-${i}.jpg`;
    a.click();
}
</script>

</body>
</html>
