<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 (Vercel 版)</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; }
        button { background: #000; color: #fff; cursor: pointer; font-weight: bold; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        img { max-width: 100%; border-radius: 10px; display: none; margin-top: 20px; }
    </style>
</head>
<body>
    <h3>💎 珠寶 AI 攝影師 (中轉技術版)</h3>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file">
    <button id="btn" onclick="start()">🚀 立即生圖 (免 VPN 測試)</button>
    <div id="status">準備就緒</div>
    <img id="out">

    <script>
    async function start() {
        const key = document.getElementById('key').value;
        const file = document.getElementById('file').files[0];
        const status = document.getElementById('status');
        
        if(!key || !file) return alert("請填寫 Key 並選圖");
        status.innerText = "⏳ 正在透過 Vercel 中轉請求...";

        const b64 = await new Promise(r => {
            const f = new FileReader();
            f.onload = e => r(e.target.result);
            f.readAsDataURL(file);
        });

        // 關鍵改動：改為 call 我哋自己嘅 /api/proxy
        try {
            const res = await fetch("/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    apiKey: key,
                    model: "openai/gpt-4o-mini",
                    messages: [{ role: "user", content: [
                        { type: "text", text: "Generate a professional jewelry photo on pure white background. Return only URL." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]}]
                })
            });

            const data = await res.json();
            const content = data.choices[0].message.content;
            const url = content.match(/https?:\/\/\S+/g)[0].replace(/[")].*$/, "");
            
            document.getElementById('out').src = url;
            document.getElementById('out').style.display = "block";
            status.innerText = "🎉 成功！";
        } catch (e) {
            status.innerText = "❌ 失敗：" + e.message;
        }
    }
    </script>
</body>
</html>
