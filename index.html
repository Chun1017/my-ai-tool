<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 商品去背換背景 - 直接版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #4A90E2; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        img { max-width: 100%; margin-top: 20px; border-radius: 8px; display: none; border: 2px solid #eee; }
        #debug-box { background: #333; color: #00ff00; padding: 15px; margin-top: 20px; border-radius: 5px; font-family: monospace; font-size: 12px; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 AI 商品換背景 (免伺服器版)</h2>
    <p>1. 請輸入你的 OpenRouter API Key (sk-or-v1-...)</p>
    <input type="password" id="apiKey" placeholder="在此貼上 API Key (僅存在瀏覽器中)">
    
    <p>2. 輸入原始商品圖片網址 (需支援跨域)</p>
    <input type="text" id="imageUrl" placeholder="https://example.com/product.jpg">
    
    <button onclick="processImage()">🚀 開始換成純白背景</button>
    
    <img id="resultImage" alt="生成結果">
    <div id="debug-box" id="debugBox"></div>
</div>

<script>
async function processImage() {
    const apiKey = document.getElementById('apiKey').value;
    const imageUrl = document.getElementById('imageUrl').value;
    const btn = document.querySelector('button');
    const resultImg = document.getElementById('resultImage');
    const debugBox = document.getElementById('debug-box');

    if (!apiKey || !imageUrl) return alert('請填寫 API Key 和圖片網址');

    btn.disabled = true;
    btn.innerText = '處理中... (轉換圖片中)';
    debugBox.style.display = 'none';

    try {
        // 1. 下載並轉換圖片為 Base64
        const imgRes = await fetch(imageUrl);
        const blob = await imgRes.blob();
        const base64Data = await blobToBase64(blob);
        const mimeType = blob.type;

        btn.innerText = 'AI 生成中 (Flux-1-Schnell)...';

        // 2. 直接呼叫 OpenRouter (使用 Flux 模型，最強且無地區鎖)
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${apiKey}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                "model": "black-forest-labs/flux-1-schnell", 
                "messages": [
                    {
                        "role": "user",
                        "content": [
                            { "type": "text", "text": "Modify this image: Remove the background and replace it with a professional, clean, pure white (#FFFFFF) studio background. Keep the product details exactly the same." },
                            { "type": "image_url", "image_url": { "url": `data:${mimeType};base64,${base64Data}` } }
                        ]
                    }
                ]
            })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(JSON.stringify(data));

        // 3. 處理回傳 (注意：Flux 這種生圖模型在 OpenRouter 可能會回傳連結或 Base64)
        console.log("AI Response:", data);
        
        // 顯示結果 (假設模型回傳了文字描述或連結)
        debugBox.innerText = "連線成功！回傳資料：\n" + JSON.stringify(data, null, 2);
        debugBox.style.display = 'block';
        
        // 如果有圖片連結，直接顯示
        if (data.choices?.[0]?.message?.content) {
            // 有些模型會直接回傳 URL 連結在文字裡
            const urlMatch = data.choices[0].message.content.match(/\bhttps?:\/\/\S+/gi);
            if (urlMatch) {
                resultImg.src = urlMatch[0];
                resultImg.style.display = 'block';
            }
        }

    } catch (err) {
        alert('發生錯誤: ' + err.message);
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.innerText = '開始生成';
    }
}

function blobToBase64(blob) {
    return new Promise((resolve, _) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
    });
}
</script>

</body>
</html>
