<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 穩定修正版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #f8f9fa; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        #out { max-width: 100%; border-radius: 12px; display: none; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶 AI 專業攝影</h3>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file" accept="image/*">
    <button id="btn" onclick="start()">🚀 立即生成白底照片</button>
    <div id="status">準備就緒 (請開 VPN)</div>
    <img id="out">
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const btn = document.getElementById('btn');

    if(!key || !file) return alert("請填寫資料");

    btn.disabled = true;
    out.style.display = "none";
    status.innerText = "⏳ 正在分析並連線美國伺服器...";

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        const res = await fetch("/api/proxy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                apiKey: key,
                model: "google/gemini-2.0-flash-001", 
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Create a professional commercial jewelry photo. Use pollination style. Return ONLY the direct image URL on white background." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        
        if (data.choices && data.choices[0].message) {
            const content = data.choices[0].message.content;
            // 強化網址提取邏輯
            const urlMatch = content.match(/https?:\/\/[^\s"'>)]+/g);
            
            if (urlMatch) {
                let finalUrl = urlMatch[0];
                // 移除可能存在的末尾標點
                finalUrl = finalUrl.replace(/[).,;]$/, "");
                
                out.src = finalUrl;
                out.style.display = "block";
                status.innerText = "🎉 生成成功！請等候圖片載入...";
            } else {
                status.innerText = "❌ 無法從 AI 回應中提取網址";
            }
        } else if (data.error) {
            status.innerText = "❌ 錯誤：" + data.error.message;
        }
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
