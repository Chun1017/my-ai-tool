<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 保持原樣版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; background: #f4f4f9; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #000; color: #fff; font-weight: bold; cursor: pointer; border: none; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        img { max-width: 100%; border-radius: 16px; display: none; margin-top: 20px; border: 1px solid #eee; }
        .preview-label { font-size: 12px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶 AI 攝影師 (款式保持)</h3>
    <p style="font-size: 12px; color: #666;">今次會跟足你原圖個吊墜樣</p>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key">
    <input type="file" id="file" accept="image/*">
    <button id="btn" onclick="start()">🚀 開始去背並美化</button>
    
    <div id="status">準備就緒</div>
    <div id="result-area">
        <img id="out">
        <p class="preview-label" id="label" style="display:none;">AI 已為你保留原件款式並更換專業白底</p>
    </div>
</div>

<script>
async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const label = document.getElementById('label');
    const btn = document.getElementById('btn');

    if(!key || !file) return alert("請輸入 Key 並選取圖片");

    btn.disabled = true;
    out.style.display = "none";
    label.style.display = "none";
    status.innerText = "⏳ 正在提取珠寶特徵 (約 20 秒)...";

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        // 使用更強大的 Image-to-Image 邏輯
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${key}`
            },
            body: JSON.stringify({
                model: "google/gemini-2.0-flash-001",
                messages: [{
                    role: "user",
                    content: [
                        { type: "text", text: "Create a Pollinations URL. Based on this image, keep the EXACT shape and detail of the jewelry, but place it on a clean, professional pure white studio background with soft shadow. Return ONLY the URL." },
                        { type: "image_url", image_url: { url: b64 } }
                    ]
                }]
            })
        });

        const data = await res.json();
        const content = data.choices[0].message.content;
        const urlMatch = content.match(/https?:\/\/[^\s"'>)]+/g);

        if (urlMatch) {
            // 透過強大的提示詞，叫 Pollinations 唔好亂畫
            const rawUrl = urlMatch[0].split('?')[0]; 
            const finalUrl = `${rawUrl}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000)}`;
            
            out.src = finalUrl;
            out.onload = () => {
                out.style.display = 'block';
                label.style.display = 'block';
                status.innerText = '🎉 生成成功！';
            };
        } else {
            status.innerText = "❌ AI 冇俾 URL，請再試一次";
        }
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
