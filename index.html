<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珠寶 AI 攝影師 - 穩定版</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f4f7f9; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: left; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { border: 2px dashed #ddd; padding: 15px; border-radius: 10px; min-height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        img { max-width: 100%; border-radius: 8px; display: none; margin-bottom: 10px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #999; }
        #status { color: #007bff; font-weight: bold; margin: 15px 0; }
        #debug { background: #eee; padding: 10px; font-size: 11px; display: none; text-align: left; overflow: auto; max-height: 150px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💎 珠寶 AI 攝影師 (穩定版)</h2>
    <input type="password" id="apiKey" placeholder="輸入 OpenRouter API Key">
    <input type="text" id="sku" placeholder="商品 SKU (例如: Heart-01)">
    <input type="file" id="fileInput" accept="image/*">
    <button id="mainBtn" onclick="run()">🚀 一鍵生成圖片</button>
    <div id="status">準備就緒</div>
    
    <div class="grid">
        <div class="box">
            <b>白底圖</b>
            <img id="img1">
            <button id="btn1" style="display:none" onclick="download(1)">下載 -1.jpg</button>
        </div>
        <div class="box">
            <b>灰底圖</b>
            <img id="img2">
            <button id="btn2" style="display:none" onclick="download(2)">下載 -2.jpg</button>
        </div>
    </div>
    <pre id="debug"></pre>
</div>

<script>
async function run() {
    const key = document.getElementById('apiKey').value;
    const sku = document.getElementById('sku').value;
    const file = document.getElementById('fileInput').files[0];
    const status = document.getElementById('status');
    const mainBtn = document.getElementById('mainBtn');

    if(!key || !file) return alert("請填寫 Key 並上傳圖片");

    mainBtn.disabled = true;
    status.innerText = "⏳ 正在處理圖片...";

    try {
        // 1. 壓縮圖片
        const resizedUrl = await new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = 800;
                    img.width > img.height ? canvas.height = 800 * (img.height/img.width) : canvas.width = 800 * (img.width/img.height);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 2. 辨識材質
        status.innerText = "⏳ 正在辨識材質...";
        const classRes = await fetch("https://openrouter.ai/api/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "qwen/qwen-2-vl-7b-instruct",
                messages: [{ role: "user", content: [{ type: "text", text: "Material? Pearl/Moissanite/Jade/Crystal. One word." }, { type: "image_url", image_url: { url: resizedUrl } }] }]
            })
        });
        const classData = await classRes.json();
        const material = classData.choices[0].message.content.trim();
        status.innerText = `✅ 材質：${material}。正在生圖...`;

        // 3. 生圖函數
        const gen = async (bg, imgId, btnId) => {
            const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${key}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "black-forest-labs/flux-1-schnell",
                    messages: [{ role: "user", content: `Jewelry photography, ${material}, ${bg} background, studio light, 1024x1024, high detail.` }]
                })
            });
            const data = await res.json();
            const url = data.choices[0].message.content.match(/https?:\/\/\S+/g)[0].replace(/[")].*$/, "");
            document.getElementById(imgId).src = url;
            document.getElementById(imgId).style.display = "block";
            document.getElementById(btnId).style.display = "block";
        };

        await Promise.all([ gen("pure white", "img1", "btn1"), gen("light grey", "img2", "btn2") ]);
        status.innerText = "🎉 生成完畢！";

    } catch (e) {
        status.innerText = "❌ 出錯了";
        document.getElementById('debug').innerText = e.message;
        document.getElementById('debug').style.display = "block";
    } finally {
        mainBtn.disabled = false;
    }
}

function download(i) {
    const a = document.createElement('a');
    a.href = document.getElementById(`img${i}`).src;
    a.download = `${document.getElementById('sku').value || 'item'}-${i}.jpg`;
    a.click();
}
</script>
</body>
</html>
