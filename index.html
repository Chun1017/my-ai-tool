<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>珠寶 AI 攝影師 - 最終修正版</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; background: #000; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        #status { color: #2563eb; margin: 20px 0; font-weight: bold; }
        #image-container { margin-top: 20px; position: relative; min-height: 200px; display: none; }
        img { max-width: 100%; border-radius: 12px; border: 1px solid #eee; }
        .loader { font-size: 12px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h3>💎 珠寶 AI 攝影師</h3>
    <input type="password" id="key" placeholder="貼上 OpenRouter API Key" style="width:100%; padding:10px; margin-bottom:10px;">
    <input type="file" id="file" accept="image/*" style="width:100%; margin-bottom:10px;">
    <button id="btn" onclick="start()">🚀 立即生圖</button>
    
    <div id="status">準備就緒 (請開 VPN)</div>

    <div id="image-container">
        <div class="loader">正在從雲端下載圖片 (可能需時 10 秒)...</div>
        <img id="out" onload="onImageLoad()" onerror="onImageError()">
    </div>
</div>

<script>
function onImageLoad() {
    document.querySelector('.loader').style.display = 'none';
    document.getElementById('status').innerText = "🎉 圖片載入成功！";
}

function onImageError() {
    document.getElementById('status').innerText = "❌ 載入超時，請點擊下方連結手動查看";
}

async function start() {
    const key = document.getElementById('key').value;
    const file = document.getElementById('file').files[0];
    const status = document.getElementById('status');
    const container = document.getElementById('image-container');
    const out = document.getElementById('out');

    if(!key || !file) return alert("請填寫資料");

    status.innerText = "⏳ 正在分析圖片...";
    container.style.display = "block";
    out.style.display = "none";
    document.querySelector('.loader').style.display = 'block';

    const b64 = await new Promise(r => {
        const f = new FileReader();
        f.onload = e => r(e.target.result);
        f.readAsDataURL(file);
    });

    try {
        const res = await fetch("/api/proxy", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                apiKey: key,
                model: "google/gemini-2.0-flash-001",
                messages: [{ role: "user", content: [
                    { type: "text", text: "Return ONLY a pollination image URL for this jewelry on white background." },
                    { type: "image_url", image_url: { url: b64 } }
                ]}]
            })
        });

        const data = await res.json();
        const content = data.choices[0].message.content;
        const urlMatch = content.match(/https?:\/\/\S+/g);

        if (urlMatch) {
            // 加一個隨機數防止瀏覽器讀取舊的爛圖快取
            const finalUrl = urlMatch[0] + "&t=" + Date.now();
            out.src = finalUrl;
            out.style.display = "block";
            status.innerText = "⏳ 雲端畫圖中，請等候...";
        }
    } catch (e) {
        status.innerText = "❌ 失敗：" + e.message;
    }
}
</script>
</body>
</html>
